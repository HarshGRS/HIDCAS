<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Portal - HIDCAS</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo-section">
                <h1>HIDCAS</h1>
            </div>
            <nav class="nav-menu">
                <a href="dashboard-main.html" class="nav-item">
                    <span class="icon">💬</span> Chat
                </a>
                <a href="search.html" class="nav-item">
                    <span class="icon">🔍</span> Search
                </a>
                <a href="profile.html" class="nav-item">
                    <span class="icon">👤</span> Profile
                </a>
                <a href="settings.html" class="nav-item">
                    <span class="icon">⚙️</span> Settings
                </a>
                <a href="admin.html" class="nav-item active">
                    <span class="icon">🛡️</span> Admin
                </a>
            </nav>
            <button id="logout-button" class="logout">Logout</button>
        </aside>

        <main class="admin-area">
            <h2>Admin Portal</h2>

            <!-- Create Role & Permission -->
            <div class="settings-panel">
                <h4>Create New Role / Permission</h4>
                <div style="display:flex; gap:20px; flex-wrap:wrap;">
                    <div class="form-group" style="flex:1; min-width:200px;">
                        <label>New Role</label>
                        <input type="text" id="new-role-input" placeholder="e.g. finance" />
                        <button id="create-role-btn">Create Role</button>
                    </div>
                    <div class="form-group" style="flex:1; min-width:200px;">
                        <label>New Permission</label>
                        <input type="text" id="new-perm-input" placeholder="e.g. export_report" />
                        <button id="create-perm-btn">Create Permission</button>
                    </div>
                </div>
            </div>

            <!-- Permissions Matrix -->
            <div class="settings-panel">
                <h4>Role Permissions Matrix</h4>
                <p style="color:#989393; font-size:13px; margin-bottom:16px;">
                    Check/uncheck to grant or remove permissions for each role.
                </p>
                <div style="overflow-x:auto;">
                    <table class="admin-perm-table" id="matrix-table">
                        <thead>
                            <tr id="matrix-header">
                                <th style="color:#000000;">Role \ Permission</th>
                            </tr>
                        </thead>
                        <tbody id="matrix-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- Assign Role to User -->
            <div class="settings-panel">
                <h4>Assign Role to User</h4>
                <div class="form-group" style="max-width:400px;">
                    <label>Select User</label>
                    <select id="user-select">
                        <option value="">-- Select User --</option>
                    </select>
                    <label>Select Role</label>
                    <select id="role-select">
                        <option value="">-- Select Role --</option>
                    </select>
                    <button id="assign-role-btn">Assign Role</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script-admin.js"></script>
</body>
</html>
