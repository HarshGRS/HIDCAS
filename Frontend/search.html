<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Documents - ProjectChat</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-section">
                <h1>HIDCAS</h1>
            </div>

            <nav class="nav-menu">
                <a href="dashboard-main.html" class="nav-item">
                    <span class="icon">💬</span> Chat
                </a>
                <a href="search.html" class="nav-item active">
                    <span class="icon">🔍</span> Search
                </a>
                <a href="profile.html" class="nav-item">
                    <span class="icon">👤</span> Profile
                </a>
                <a href="settings.html" class="nav-item">
                    <span class="icon">⚙️</span> Settings
                </a>
                <a href="admin.html" class="nav-item" id="admin-nav" style="display:none;">
                    <span class="icon">🛡️</span> Admin
                </a>
            </nav>

            <button id="logout-button" class="logout">Logout</button>
        </aside>

        <!-- Main Search Area -->
        <main class="search-area">
            <h2>Search Documents</h2>

            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search by document name..." />
                <button id="search-btn">Search</button>
            </div>

            <div id="search-results" class="search-results"></div>
        </main>
    </div>

    <script src="script-search.js"></script>
</body>
</html>
